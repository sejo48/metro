<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor AR Pro - Jorge Hernández</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: system-ui, sans-serif; }
        canvas { display: block; }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .neon-border { border: 1px solid rgba(34, 211, 238, 0.4); }
        
        #ar-button-container button {
            white-space: nowrap !important;
            width: auto !important;
            min-width: 240px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .scroll-hide::-webkit-scrollbar { display: none; }
        
        /* Estilo para el logotipo de Jorge Hernández */
        .app-logo {
            width: 180px;
            height: 180px;
            border-radius: 2rem;
            box-shadow: 0 10px 40px rgba(6, 182, 212, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            background-color: #000;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-between py-12 px-6 bg-slate-950 text-white text-center">
        <div class="mt-8 flex flex-col items-center">
            <!-- Nuevo Logotipo de Jorge Hernández -->
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj3-Z5UfmFQ8DyLGnUpruMPE4YJqcz15-vCkU3ygPmcE8odpiUzedzokhsxUpt9upGII3iAHPlf5eUAi68Q5aaJl0c0962hvuCVjVdvCteGYslw-pn7NfBN01136WRzhDHGybDTnIR9c8N1JCmQp4OzlFsce1rZup9OJ0uBlgABsYIQaeRCnq6VkbF9KHU/s320/WhatsApp%20Image%202026-03-30%20at%202.54.38%20PM%20(1).jpeg" 
                 alt="Logo Medidor AR Pro" 
                 class="app-logo mb-6">
            
            <h1 class="text-4xl font-black tracking-tighter uppercase italic text-white leading-none">MEDIDOR AR <span class="text-cyan-400">PRO</span></h1>
            <p class="text-slate-400 text-xs tracking-widest mt-2 uppercase font-bold opacity-70 italic">Jorge Hernández - Edición 2026</p>
        </div>

        <div id="ar-button-container" class="w-full flex justify-center px-4"></div>

        <div class="opacity-80 text-center">
            <p class="text-[10px] tracking-[0.4em] text-cyan-500 font-black mb-1 uppercase">Software de Ingeniería de Campo</p>
            <p class="text-sm font-medium tracking-tight text-white/60 italic leading-tight">Mediciones precisas en tiempo real</p>
        </div>
    </div>

    <!-- Interfaz de Medición -->
    <div id="ui-layer" class="fixed inset-0 pointer-events-none hidden flex-col justify-between p-6 z-40">
        <div class="flex flex-col items-center gap-4">
            <div class="glass p-6 rounded-[2.5rem] text-center shadow-2xl neon-border min-w-[300px]">
                <div class="flex justify-between items-center px-2 mb-2 border-b border-white/5 pb-2">
                    <div class="text-left">
                        <p class="text-[8px] text-slate-500 font-black uppercase tracking-widest">Total Acumulado</p>
                        <p id="total-display" class="text-xl font-black text-cyan-400 leading-none">0.00 m</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-slate-500 font-black uppercase tracking-widest">Puntos</p>
                        <p id="points-count" class="text-xl font-black text-white leading-none">0</p>
                    </div>
                </div>
                <div class="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em] mb-1">Medida en Vivo</div>
                <div id="distance-display" class="text-6xl font-black text-white tracking-tighter italic leading-none">0.00 <span class="text-xl not-italic font-medium text-cyan-400">m</span></div>
            </div>
            <div id="history-container" class="w-full max-w-[280px] max-h-32 overflow-y-auto scroll-hide flex flex-col gap-1 pointer-events-auto text-white"></div>
        </div>

        <!-- Mira Reforzada -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
            <div class="w-16 h-16 border-2 border-white/40 rounded-full"></div>
            <div class="absolute w-10 h-[1.5px] bg-white/80"></div>
            <div class="absolute h-10 w-[1.5px] bg-white/80"></div>
            <div class="w-3 h-3 bg-cyan-400 rounded-full shadow-[0_0_20px_#22d3ee] border-2 border-slate-950"></div>
        </div>

        <div class="flex justify-between items-center gap-4 pointer-events-auto">
            <button id="clear-btn" class="glass p-6 rounded-[2.5rem] active:scale-90 border-red-500/20 shadow-lg text-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
            <button id="height-btn" class="glass flex-1 py-6 rounded-[2.5rem] active:scale-95 border-yellow-500/30 flex items-center justify-center gap-3 shadow-lg transition-colors text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                </svg>
                <span class="text-xs font-black uppercase tracking-[0.2em]">Alturas</span>
            </button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
        import { ARButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let markers = [];
        let historySegments = [];
        let mainLine = null;
        let isHeightMode = false;
        let basePoint = null;

        const distanceDisplay = document.getElementById('distance-display');
        const totalDisplay = document.getElementById('total-display');
        const pointsCount = document.getElementById('points-count');
        const historyContainer = document.getElementById('history-container');
        const uiLayer = document.getElementById('ui-layer');
        const startScreen = document.getElementById('start-screen');
        const heightBtn = document.getElementById('height-btn');

        async function init() {
            if ('xr' in navigator) {
                const supported = await navigator.xr.isSessionSupported('immersive-ar');
                if (supported) setupAR();
            }
        }

        function setupAR() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const button = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            
            button.classList.add('!bg-cyan-600', '!text-white', '!font-black', '!rounded-[2rem]', '!py-5', '!px-12', '!border-none', '!static', '!uppercase', '!tracking-[0.2em]', '!text-xs', '!shadow-2xl');
            document.getElementById('ar-button-container').appendChild(button);

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2));

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.045, 0.055, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: false, opacity: 1.0 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            renderer.xr.addEventListener('sessionstart', () => {
                startScreen.style.display = 'none';
                uiLayer.style.display = 'flex';
            });

            window.addEventListener('click', (ev) => {
                if (!reticle.visible || ev.target.closest('button')) return;
                const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                if (isHeightMode) handleHeightModeClick(pos);
                else handleNormalModeClick(pos);
            });

            heightBtn.addEventListener('click', () => {
                isHeightMode = !isHeightMode;
                clearMeasurements();
                if (isHeightMode) heightBtn.classList.add('bg-yellow-500/20', 'border-yellow-500');
                else heightBtn.classList.remove('bg-yellow-500/20', 'border-yellow-500');
            });

            document.getElementById('clear-btn').addEventListener('click', () => location.reload());
            renderer.setAnimationLoop(render);
        }

        function handleNormalModeClick(pos) {
            if (points.length > 0) {
                const dist = points[points.length - 1].distanceTo(pos);
                historySegments.push(dist);
                addHistoryItem(dist, historySegments.length);
                updateTotal();
            }
            const marker = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), new THREE.MeshBasicMaterial({ color: points.length === 0 ? 0x22c55e : 0x00ffff }));
            marker.position.copy(pos);
            scene.add(marker);
            markers.push(marker);
            points.push(pos);
            pointsCount.innerText = points.length;
            updateLine();
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function addHistoryItem(dist, index) {
            const item = document.createElement('div');
            item.className = 'glass px-4 py-2 rounded-xl flex justify-between items-center border border-white/10';
            item.innerHTML = `<span class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Tramo ${index}</span><span class="text-sm font-black text-white italic">${dist.toFixed(2)} m</span>`;
            historyContainer.prepend(item);
        }

        function updateTotal() {
            const total = historySegments.reduce((a, b) => a + b, 0);
            totalDisplay.innerText = total.toFixed(2) + " m";
        }

        function handleHeightModeClick(pos) {
            if (!basePoint) {
                basePoint = pos.clone();
                const m = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), new THREE.MeshBasicMaterial({ color: 0x22c55e }));
                m.position.copy(basePoint);
                scene.add(m); markers.push(m);
            } else {
                const h = Math.abs(camera.position.y - basePoint.y);
                const top = new THREE.Vector3(basePoint.x, basePoint.y + h, basePoint.z);
                const m = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), new THREE.MeshBasicMaterial({ color: 0xeab308 }));
                m.position.copy(top);
                scene.add(m); markers.push(m);
                points.push(basePoint, top); updateLine();
                basePoint = null;
            }
        }

        function updateLine() {
            if (mainLine) scene.remove(mainLine);
            if (points.length >= 2) {
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                mainLine = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 }));
                scene.add(mainLine);
            }
        }

        function clearMeasurements() {
            markers.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
            if (mainLine) scene.remove(mainLine);
            markers = []; points = []; historySegments = []; mainLine = null; basePoint = null;
            distanceDisplay.innerHTML = `0.00 <span class="text-2xl">m</span>`;
            totalDisplay.innerText = "0.00 m"; pointsCount.innerText = "0"; historyContainer.innerHTML = "";
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const refSpace = renderer.xr.getReferenceSpace();
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(rs => {
                        session.requestHitTestSource({ space: rs }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const hits = frame.getHitTestResults(hitTestSource);
                    if (hits.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(hits[0].getPose(refSpace).transform.matrix);
                        if (points.length > 0 && !isHeightMode) {
                            const currentPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                            const dist = points[points.length - 1].distanceTo(currentPos);
                            distanceDisplay.innerHTML = `${dist.toFixed(2)} <span class="text-2xl not-italic font-medium text-cyan-400">m</span>`;
                        }
                    } else reticle.visible = false;
                }
                if (isHeightMode && basePoint) {
                    const h = Math.abs(camera.position.y - basePoint.y);
                    distanceDisplay.innerHTML = `${h.toFixed(2)} <span class="text-2xl not-italic font-medium text-cyan-400">m</span>`;
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
