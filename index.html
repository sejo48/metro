<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Measure Pro - Diagnóstico Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .reticle-pulse {
            animation: pulse 1.5s infinite ease-in-out;
        }
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        .glass-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden font-sans">

    <!-- Video de Cámara -->
    <video id="video-background" autoplay playsinline muted></video>

    <!-- UI: Capa de Diagnóstico -->
    <div id="diag-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-6 glass-panel hidden">
        <div class="max-w-md w-full bg-gray-900 rounded-3xl p-8 shadow-2xl border border-gray-700">
            <h2 class="text-2xl font-bold mb-4 text-center">Diagnóstico del Sistema</h2>
            <div id="diag-list" class="space-y-4">
                <!-- Items de diagnóstico -->
            </div>
            <div id="browser-help" class="mt-8 hidden">
                <p class="text-sm text-gray-400 mb-4 text-center">Parece que estás en un navegador restringido. Para usar la cámara, abre este enlace en Chrome o Safari.</p>
                <button onclick="copyToClipboard()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all">
                    Copiar Enlace
                </button>
            </div>
            <button id="btn-start" class="w-full mt-6 bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl hidden">
                Iniciar Aplicación
            </button>
        </div>
    </div>

    <!-- UI: HUD de Medición -->
    <div id="hud" class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6 opacity-0 transition-opacity duration-500 z-10">
        <!-- Superior: Info -->
        <div class="flex justify-between items-start pt-4">
            <div class="glass-panel p-4 rounded-2xl">
                <p class="text-xs text-gray-400 uppercase tracking-widest">Longitud Total</p>
                <p class="text-4xl font-black text-green-400"><span id="total-dist">0.00</span><span class="text-xl ml-1 text-white">m</span></p>
            </div>
            <div class="glass-panel p-4 rounded-2xl text-right">
                <p class="text-xs text-gray-400 uppercase tracking-widest">Nodos</p>
                <p id="node-count" class="text-2xl font-bold">0</p>
            </div>
        </div>

        <!-- Centro: Retícula -->
        <div class="flex items-center justify-center">
            <div class="relative flex items-center justify-center">
                <div class="w-12 h-12 border-2 border-white rounded-full reticle-pulse opacity-50"></div>
                <div class="absolute w-1 h-1 bg-white rounded-full"></div>
                <div id="segment-dist-popup" class="absolute bottom-16 glass-panel px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap opacity-0 transition-opacity">
                    <span id="current-segment-val">0.00</span> m
                </div>
            </div>
        </div>

        <!-- Inferior: Controles -->
        <div class="flex flex-col gap-4 pointer-events-auto">
            <div class="flex justify-center gap-4">
                <button onclick="toggleMode('linear')" id="mode-linear" class="glass-panel px-6 py-3 rounded-full text-xs font-bold border-2 border-blue-500">LINEAL</button>
                <button onclick="toggleMode('height')" id="mode-height" class="glass-panel px-6 py-3 rounded-full text-xs font-bold border-2 border-transparent text-gray-400">ALTURA</button>
            </div>
            
            <div class="flex items-center justify-between gap-4 pb-4">
                <button onclick="resetScene()" class="w-16 h-16 rounded-full glass-panel flex items-center justify-center text-red-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>

                <button onclick="addPoint()" class="flex-1 h-20 bg-white text-black rounded-3xl flex items-center justify-center shadow-xl active:scale-95 transition-transform">
                    <span class="text-xl font-black tracking-tighter">MARCAR PUNTO</span>
                </button>

                <button onclick="undoLastPoint()" class="w-16 h-16 rounded-full glass-panel flex items-center justify-center text-yellow-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN Y VARIABLES ---
        let scene, camera, renderer, raycaster;
        let points = []; // [{pos, type}]
        let measurementLines = [];
        let currentMode = 'linear';
        let groundPlane;
        let totalDistance = 0;
        let isInitialized = false;

        const COLORS = {
            base: 0x22c55e, // Verde
            intermediate: 0x22d3ee, // Cian
            height: 0xeab308 // Amarillo
        };

        // --- DIAGNÓSTICO ---
        window.onload = async () => {
            const diagOverlay = document.getElementById('diag-overlay');
            const diagList = document.getElementById('diag-list');
            diagOverlay.classList.remove('hidden');

            const isRestrictedBrowser = /FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
            const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost';

            const checks = [
                { id: 'https', name: 'Seguridad HTTPS', status: isSecure },
                { id: 'sensors', name: 'Sensores de Cámara', status: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) },
                { id: 'webxr', name: 'Soporte WebXR/3D', status: !!window.WebGLRenderingContext },
                { id: 'browser', name: 'Navegador Compatible', status: !isRestrictedBrowser }
            ];

            let allOk = true;
            diagList.innerHTML = '';
            checks.forEach(check => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-gray-800 p-3 rounded-lg";
                div.innerHTML = `
                    <span>${check.name}</span>
                    <span class="${check.status ? 'text-green-500' : 'text-red-500'} font-bold">
                        ${check.status ? 'OK' : 'FALLO'}
                    </span>
                `;
                diagList.appendChild(div);
                if (!check.status) allOk = false;
            });

            if (isRestrictedBrowser) {
                document.getElementById('browser-help').classList.remove('hidden');
            } else if (allOk) {
                document.getElementById('btn-start').classList.remove('hidden');
            } else if (!isSecure) {
                const errorMsg = document.createElement('p');
                errorMsg.className = "text-red-400 text-xs mt-4 text-center";
                errorMsg.innerText = "La cámara requiere HTTPS para funcionar.";
                diagList.appendChild(errorMsg);
            }

            document.getElementById('btn-start').onclick = () => {
                diagOverlay.classList.add('hidden');
                document.getElementById('hud').classList.remove('opacity-0');
                initApp();
            };
        };

        function copyToClipboard() {
            const el = document.createElement('textarea');
            el.value = window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("¡Enlace copiado! Pégalo en Chrome.");
        }

        // --- LÓGICA DE LA APP ---
        async function initApp() {
            if (isInitialized) return;

            // Iniciar Cámara
            try {
                const video = document.getElementById('video-background');
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
            } catch (e) {
                console.error("Error cámara:", e);
            }

            // Three.js Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            // Plano de suelo invisible para raycasting
            const geometry = new THREE.PlaneGeometry(100, 100);
            geometry.rotateX(-Math.PI / 2);
            const material = new THREE.MeshBasicMaterial({ visible: false });
            groundPlane = new THREE.Mesh(geometry, material);
            scene.add(groundPlane);

            // Luz
            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(light);

            camera.position.set(0, 1.6, 0); // Altura estimada del usuario
            
            isInitialized = true;
            animate();
        }

        function animate() {
            if (!isInitialized || !renderer || !camera) return;
            requestAnimationFrame(animate);
            
            // Raycasting desde el centro de la pantalla
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObject(groundPlane);
            
            if (intersects.length > 0 && points.length > 0) {
                const lastPoint = points[points.length - 1].pos;
                const currentPos = intersects[0].point;
                
                let dist;
                if (currentMode === 'height') {
                    // Simulación simple de altura basada en inclinación
                    dist = Math.abs(camera.position.y - lastPoint.y);
                } else {
                    dist = lastPoint.distanceTo(currentPos);
                }
                
                document.getElementById('current-segment-val').innerText = dist.toFixed(2);
                document.getElementById('segment-dist-popup').style.opacity = '1';
            } else {
                document.getElementById('segment-dist-popup').style.opacity = '0';
            }

            renderer.render(scene, camera);
        }

        function addPoint() {
            if (!isInitialized || !camera) return;

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObject(groundPlane);

            if (intersects.length > 0) {
                let targetPos = intersects[0].point.clone();
                let pointColor = COLORS.intermediate;

                if (points.length === 0) {
                    pointColor = COLORS.base;
                } else if (currentMode === 'height') {
                    pointColor = COLORS.height;
                    const lastPoint = points[points.length - 1].pos;
                    targetPos.x = lastPoint.x;
                    targetPos.z = lastPoint.z;
                    // Proyección vertical simplificada
                    targetPos.y = Math.max(lastPoint.y, camera.position.y - 0.2); 
                }

                // Crear esfera visual
                const geo = new THREE.SphereGeometry(0.04, 16, 16);
                const mat = new THREE.MeshBasicMaterial({ color: pointColor });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(targetPos);
                scene.add(mesh);

                // Dibujar línea
                let line = null;
                if (points.length > 0) {
                    const lastPoint = points[points.length - 1].pos;
                    const lineGeo = new THREE.BufferGeometry().setFromPoints([lastPoint, targetPos]);
                    const lineMat = new THREE.LineBasicMaterial({ color: pointColor, linewidth: 3 });
                    line = new THREE.Line(lineGeo, lineMat);
                    scene.add(line);
                    
                    const segmentDist = lastPoint.distanceTo(targetPos);
                    totalDistance += segmentDist;
                }

                measurementLines.push({mesh, line});
                points.push({pos: targetPos, type: currentMode});
                updateUI();
            }
        }

        function undoLastPoint() {
            if (points.length === 0) return;
            
            const lastData = measurementLines.pop();
            if (lastData.mesh) scene.remove(lastData.mesh);
            
            if (lastData.line) {
                const lastPoint = points[points.length - 1].pos;
                const prevPoint = points[points.length - 2].pos;
                totalDistance -= lastPoint.distanceTo(prevPoint);
                scene.remove(lastData.line);
            }
            
            points.pop();
            updateUI();
        }

        function resetScene() {
            measurementLines.forEach(item => {
                if (item.mesh) scene.remove(item.mesh);
                if (item.line) scene.remove(item.line);
            });
            points = [];
            measurementLines = [];
            totalDistance = 0;
            updateUI();
        }

        function toggleMode(mode) {
            currentMode = mode;
            document.getElementById('mode-linear').className = mode === 'linear' ? 'glass-panel px-6 py-3 rounded-full text-xs font-bold border-2 border-blue-500' : 'glass-panel px-6 py-3 rounded-full text-xs font-bold border-2 border-transparent text-gray-400';
            document.getElementById('mode-height').className = mode === 'height' ? 'glass-panel px-6 py-3 rounded-full text-xs font-bold border-2 border-yellow-500 text-white' : 'glass-panel px-6 py-3 rounded-full text-xs font-bold border-2 border-transparent text-gray-400';
        }

        function updateUI() {
            document.getElementById('total-dist').innerText = totalDistance.toFixed(2);
            document.getElementById('node-count').innerText = points.length;
        }

        // Listener de redimensionamiento con validación estricta
        window.addEventListener('resize', () => {
            if (isInitialized && camera && renderer) {
                const width = window.innerWidth;
                const height = window.innerHeight;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            }
        });

    </script>
</body>
</html>
