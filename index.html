<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor AR - Jorge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        .glass {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center text-center p-6 bg-slate-900 text-white">
        <div class="mb-6 p-4 bg-yellow-500 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold mb-2">Medidor AR Pro</h1>
        <p id="status-msg" class="text-slate-400 mb-8 max-w-xs">Verificando compatibilidad con Realidad Aumentada...</p>
        <div id="ar-button-container"></div>
    </div>

    <!-- Interfaz de Usuario en AR -->
    <div id="ui-layer" class="fixed inset-0 pointer-events-none hidden flex-col justify-between p-6 z-40">
        <!-- Panel Superior: Distancia -->
        <div class="flex justify-center">
            <div class="glass px-8 py-4 rounded-3xl text-center shadow-2xl">
                <div id="distance-display" class="text-4xl font-black text-cyan-400 tracking-tighter">0.00 <span class="text-xl">m</span></div>
                <div id="ar-status" class="text-xs uppercase tracking-widest text-slate-400 font-bold mt-1">Buscando superficie...</div>
            </div>
        </div>

        <!-- Punto de mira -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 border-2 border-white/50 rounded-full flex items-center justify-center">
            <div class="w-1 h-1 bg-white rounded-full"></div>
        </div>

        <!-- Panel Inferior: Controles -->
        <div class="flex justify-between items-end gap-4 pointer-events-auto">
            <button id="clear-btn" class="glass p-4 rounded-2xl active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
            
            <div class="flex-1 text-center pb-2">
                <p class="text-white text-sm font-medium bg-black/40 py-1 px-3 rounded-full inline-block backdrop-blur-sm">Toca la pantalla para fijar puntos</p>
            </div>

            <div class="w-14 h-14"></div> <!-- Espaciador para equilibrio visual -->
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
        import { ARButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let markers = [];
        let line;

        const distanceDisplay = document.getElementById('distance-display');
        const arStatus = document.getElementById('ar-status');
        const statusMsg = document.getElementById('status-msg');
        const uiLayer = document.getElementById('ui-layer');
        const startScreen = document.getElementById('start-screen');
        const clearBtn = document.getElementById('clear-btn');

        async function init() {
            if ('xr' in navigator) {
                const supported = await navigator.xr.isSessionSupported('immersive-ar');
                if (supported) {
                    statusMsg.innerText = "¡Listo para medir!";
                    setupAR();
                } else {
                    statusMsg.innerText = "Lo siento Jorge, tu dispositivo no soporta AR.";
                    statusMsg.classList.add('text-red-400');
                }
            } else {
                statusMsg.innerText = "Navegador no compatible con WebXR.";
                statusMsg.classList.add('text-red-400');
            }
        }

        function setupAR() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const button = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            
            button.classList.add('!bg-yellow-500', '!text-slate-900', '!font-bold', '!rounded-xl', '!py-4', '!px-8', '!border-none', '!static');
            document.getElementById('ar-button-container').appendChild(button);

            // Luces
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // Retícula mejorada
            const ringGeom = new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2);
            const dotGeom = new THREE.CircleGeometry(0.005, 16).rotateX(-Math.PI / 2);
            
            reticle = new THREE.Group();
            const ring = new THREE.Mesh(ringGeom, new THREE.MeshBasicMaterial({ color: 0x00ffff }));
            const dot = new THREE.Mesh(dotGeom, new THREE.MeshBasicMaterial({ color: 0xffffff }));
            reticle.add(ring);
            reticle.add(dot);
            
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            renderer.xr.addEventListener('sessionstart', () => {
                startScreen.style.display = 'none';
                uiLayer.style.display = 'flex';
            });

            renderer.xr.addEventListener('sessionend', () => {
                location.reload();
            });

            window.addEventListener('click', onSelect);
            clearBtn.addEventListener('click', clearMeasurements);
            window.addEventListener('resize', onWindowResize);

            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            if (!reticle.visible) return;

            const position = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
            
            // Crear marcador visual (esfera)
            const markerGeom = new THREE.SphereGeometry(0.015, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: points.length === 0 ? 0x00ff00 : 0x00ffff });
            const marker = new THREE.Mesh(markerGeom, markerMat);
            marker.position.copy(position);
            scene.add(marker);
            
            markers.push(marker);
            points.push(position);

            updateLine();

            if (navigator.vibrate) navigator.vibrate(40);
        }

        function updateLine() {
            if (line) scene.remove(line);

            if (points.length >= 2) {
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 });
                line = new THREE.Line(geometry, material);
                scene.add(line);

                let totalDistance = 0;
                for (let i = 0; i < points.length - 1; i++) {
                    totalDistance += points[i].distanceTo(points[i+1]);
                }
                distanceDisplay.innerHTML = `${totalDistance.toFixed(2)} <span class="text-xl">m</span>`;
            }
        }

        function clearMeasurements() {
            markers.forEach(m => scene.remove(m));
            if (line) scene.remove(line);
            markers = [];
            points = [];
            line = null;
            distanceDisplay.innerHTML = `0.00 <span class="text-xl">m</span>`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((refSpace) => {
                        session.requestHitTestSource({ space: refSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                        arStatus.innerText = "Listo para medir";
                        arStatus.classList.replace('text-slate-400', 'text-cyan-400');
                    } else {
                        reticle.visible = false;
                        arStatus.innerText = "Mueve el móvil para detectar superficies";
                        arStatus.classList.replace('text-cyan-400', 'text-slate-400');
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
