<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medidor AR Pro - Jorge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            touch-action: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #crosshair::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #ffcc00;
            border-radius: 50%;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            margin: 15px;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }
        #distance-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffcc00;
            margin: 0;
        }
        #status-text {
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .bottom-controls {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding-bottom: env(safe-area-inset-bottom, 30px);
            padding-top: 20px;
            pointer-events: auto;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        #action-btn {
            width: 90px;
            height: 90px;
            background: #ffcc00;
            border-radius: 50%;
            border: 5px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            transition: transform 0.1s, opacity 0.2s;
        }
        #action-btn:active { transform: scale(0.9); }
        #action-btn.disabled { opacity: 0.3; filter: grayscale(1); }
        #action-btn svg { width: 45px; height: 45px; fill: black; }

        .btn-side {
            background: rgba(40, 40, 40, 0.9);
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #start-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 1000;
            text-align: center;
            color: white;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: #ffcc00; font-size: 2.5rem;">MEDIDOR AR</h1>
        <p style="margin-bottom: 40px; opacity: 0.8;">Jorge, apunta al suelo y muévete despacio para detectar superficies.</p>
        <button id="ar-launch-btn" style="padding: 20px 60px; border-radius: 40px; border: none; background: #ffcc00; font-weight: bold; font-size: 1.2rem; color: black; cursor: pointer;">INICIAR</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="info-panel">
            <div id="distance-text">0.00 m</div>
            <div id="status-text">Buscando superficie...</div>
        </div>

        <div id="crosshair"></div>

        <div class="bottom-controls">
            <div class="btn-side" id="undo-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5M4 9h11a4 4 0 0 1 4 4v1"></path></svg>
            </div>
            
            <div id="action-btn" class="disabled">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>

            <div class="btn-side" id="reset-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </div>
        </div>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        
        let points = [];
        let spheres = [];
        let line = null;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const overlay = document.getElementById('ui-overlay');
            const arBtn = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: overlay }
            });

            document.getElementById('ar-launch-btn').onclick = () => {
                arBtn.click();
                document.getElementById('start-screen').style.display = 'none';
                overlay.style.display = 'flex';
            };

            // Retículo para el hit-test (suelo)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffcc00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // EVENTO PRINCIPAL: Botón +
            const actionBtn = document.getElementById('action-btn');
            actionBtn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (reticle.visible) {
                    const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    addPoint(pos);
                    // Feedback táctil
                    if (navigator.vibrate) navigator.vibrate(40);
                }
            });

            document.getElementById('undo-btn').onclick = undoLastPoint;
            document.getElementById('reset-btn').onclick = resetMeasurement;

            renderer.setAnimationLoop(render);
        }

        function addPoint(pos) {
            const geometry = new THREE.SphereGeometry(0.015, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.copy(pos);
            scene.add(sphere);
            
            points.push(pos);
            spheres.push(sphere);
            updateLine();
        }

        function undoLastPoint() {
            if (points.length > 0) {
                points.pop();
                scene.remove(spheres.pop());
                updateLine();
            }
        }

        function resetMeasurement() {
            points = [];
            spheres.forEach(s => scene.remove(s));
            spheres = [];
            if (line) scene.remove(line);
            line = null;
            document.getElementById('distance-text').innerText = "0.00 m";
        }

        function updateLine() {
            if (line) scene.remove(line);
            if (points.length >= 2) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({ color: 0xffcc00, linewidth: 6 });
                line = new THREE.Line(geo, mat);
                scene.add(line);
            }
            calculateDistance();
        }

        function calculateDistance() {
            let dist = 0;
            for (let i = 0; i < points.length - 1; i++) {
                dist += points[i].distanceTo(points[i+1]);
            }
            document.getElementById('distance-text').innerText = dist.toFixed(2) + " m";
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(source => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    const statusText = document.getElementById('status-text');
                    const actionBtn = document.getElementById('action-btn');

                    if (results.length) {
                        const hit = results[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                        
                        statusText.innerText = "Listo para medir";
                        statusText.style.color = "#ffcc00";
                        actionBtn.classList.remove('disabled');
                    } else {
                        reticle.visible = false;
                        statusText.innerText = "Buscando superficie...";
                        statusText.style.color = "#aaa";
                        actionBtn.classList.add('disabled');
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
