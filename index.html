<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Measure Pro - Calibrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .reticle-pulse { animation: pulse 1.5s infinite ease-in-out; }
        #video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }
        canvas {
            display: block; position: fixed; top: 0; left: 0;
            z-index: 1; pointer-events: none;
        }
        .glass-panel {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden font-sans">

    <video id="video-background" autoplay playsinline muted></video>

    <!-- Diagnóstico y Permisos -->
    <div id="diag-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-6 glass-panel">
        <div class="max-w-md w-full bg-gray-900 rounded-3xl p-8 shadow-2xl border border-blue-500/30">
            <h2 class="text-2xl font-bold mb-4 text-center text-blue-400">Calibración de Medida</h2>
            <p class="text-gray-400 text-sm mb-6 text-center">Para corregir el error de 0.33m, asegúrate de dar permisos de movimiento y cámara.</p>
            <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg">
                CALIBRAR Y EMPEZAR
            </button>
        </div>
    </div>

    <!-- HUD de Usuario -->
    <div id="hud" class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6 opacity-0 transition-opacity duration-500 z-10">
        <div class="flex justify-between items-start pt-2">
            <div class="glass-panel p-4 rounded-2xl border-l-4 border-l-green-500">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Longitud Total</p>
                <p class="text-4xl font-black text-white"><span id="total-dist">0.00</span><span class="text-lg ml-1 opacity-50">m</span></p>
            </div>
            
            <!-- Selector de Calibración (Ajuste de Altura) -->
            <div class="glass-panel p-3 rounded-2xl pointer-events-auto flex flex-col items-center">
                <p class="text-[9px] text-blue-400 font-bold mb-1">ALTURA CÁMARA (m)</p>
                <input type="range" id="height-range" min="0.5" max="2.5" step="0.1" value="1.6" 
                       class="w-24 accent-blue-500 h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                <span id="height-val" class="text-xs font-bold mt-1">1.6 m</span>
            </div>
        </div>

        <!-- Retícula Central -->
        <div class="flex items-center justify-center">
            <div class="relative flex items-center justify-center">
                <div class="w-16 h-16 border border-white/30 rounded-full reticle-pulse"></div>
                <div class="absolute w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_15px_#3b82f6]"></div>
                <div id="segment-dist-popup" class="absolute bottom-20 glass-panel px-4 py-2 rounded-full text-sm font-black border border-blue-500/50 opacity-0 transition-all">
                    <span id="current-segment-val">0.00</span> m
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="flex flex-col gap-4 pointer-events-auto">
            <div class="flex justify-center gap-3">
                <button onclick="setMode('linear')" id="btn-linear" class="glass-panel px-6 py-2 rounded-full text-[10px] font-black border-2 border-blue-500">LINEAL</button>
                <button onclick="setMode('height')" id="btn-height" class="glass-panel px-6 py-2 rounded-full text-[10px] font-black border-2 border-transparent text-gray-500">ALTURA</button>
            </div>
            
            <div class="flex items-center justify-between gap-4 pb-4">
                <button onclick="resetScene()" class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>

                <button onclick="addPoint()" class="flex-1 h-20 bg-blue-600 text-white rounded-3xl flex flex-col items-center justify-center shadow-2xl active:scale-95 transition-all">
                    <span class="text-xl font-black tracking-tighter italic">CAPTURAR</span>
                    <span class="text-[9px] font-bold opacity-70 tracking-widest uppercase">Fijar Punto</span>
                </button>

                <button onclick="undoLastPoint()" class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-yellow-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, raycaster;
        let points = [], measurementLines = [];
        let currentMode = 'linear', totalDistance = 0, isInitialized = false;
        let groundPlane;
        let deviceHeight = 1.6;

        // --- SISTEMA DE SENSORES Y ARRANQUE ---
        document.getElementById('btn-start').onclick = async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try { await DeviceOrientationEvent.requestPermission(); } catch (e) { console.error(e); }
            }
            document.getElementById('diag-overlay').classList.add('hidden');
            document.getElementById('hud').classList.remove('opacity-0');
            initApp();
        };

        // Escuchar cambios en el slider de altura
        document.getElementById('height-range').oninput = (e) => {
            deviceHeight = parseFloat(e.target.value);
            document.getElementById('height-val').innerText = deviceHeight + " m";
            if(camera) camera.position.y = deviceHeight;
        };

        async function initApp() {
            if (isInitialized) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                document.getElementById('video-background').srcObject = stream;
            } catch (e) { alert("Cámara no detectada."); }

            scene = new THREE.Scene();
            // FOV ajustado para cámaras móviles estándar (aprox 60-70)
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.01, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            const groundGeo = new THREE.PlaneGeometry(200, 200);
            groundGeo.rotateX(-Math.PI / 2);
            groundPlane = new THREE.Mesh(groundGeo, new THREE.MeshBasicMaterial({ visible: false }));
            scene.add(groundPlane);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            camera.position.set(0, deviceHeight, 0); 

            window.addEventListener('deviceorientation', (e) => {
                if (!e.alpha) return;
                const alpha = THREE.MathUtils.degToRad(e.alpha);
                const beta = THREE.MathUtils.degToRad(e.beta);
                const gamma = THREE.MathUtils.degToRad(e.gamma);
                camera.rotation.set(beta - Math.PI/2, gamma, alpha, 'YXZ');
            }, true);

            isInitialized = true;
            animate();
        }

        function animate() {
            if (!isInitialized) return;
            requestAnimationFrame(animate);
            
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObject(groundPlane);
            
            if (points.length > 0) {
                const last = points[points.length - 1].pos;
                let lookAtPos = new THREE.Vector3();
                
                if (intersects.length > 0) {
                    lookAtPos.copy(intersects[0].point);
                } else {
                    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    lookAtPos.copy(camera.position).add(dir.multiplyScalar(2));
                }

                let d = (currentMode === 'height') ? Math.abs(camera.position.y - last.y) : last.distanceTo(lookAtPos);
                
                document.getElementById('current-segment-val').innerText = d.toFixed(2);
                document.getElementById('segment-dist-popup').style.opacity = '1';
            }
            renderer.render(scene, camera);
        }

        function addPoint() {
            if (!isInitialized) return;
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObject(groundPlane);

            let pos = new THREE.Vector3();
            if (intersects.length > 0) {
                pos.copy(intersects[0].point);
            } else {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                pos.copy(camera.position).add(dir.multiplyScalar(deviceHeight));
            }

            const color = points.length === 0 ? 0x22c55e : (currentMode === 'height' ? 0xeab308 : 0x3b82f6);
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), new THREE.MeshBasicMaterial({ color: color }));
            dot.position.copy(pos);
            scene.add(dot);

            let line = null;
            if (points.length > 0) {
                const last = points[points.length - 1].pos;
                const geo = new THREE.BufferGeometry().setFromPoints([last, pos]);
                line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: color, linewidth: 5 }));
                scene.add(line);
                totalDistance += last.distanceTo(pos);
            }

            measurementLines.push({ dot, line });
            points.push({ pos, mode: currentMode });
            if (navigator.vibrate) navigator.vibrate(40);
            updateUI();
        }

        function undoLastPoint() {
            if (points.length === 0) return;
            const last = measurementLines.pop();
            scene.remove(last.dot);
            if (last.line) {
                const d = points[points.length-1].pos.distanceTo(points[points.length-2].pos);
                totalDistance -= d;
                scene.remove(last.line);
            }
            points.pop();
            updateUI();
        }

        function resetScene() {
            measurementLines.forEach(l => { scene.remove(l.dot); if(l.line) scene.remove(l.line); });
            points = []; measurementLines = []; totalDistance = 0;
            updateUI();
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('btn-linear').style.borderColor = m === 'linear' ? '#3b82f6' : 'transparent';
            document.getElementById('btn-height').style.borderColor = m === 'height' ? '#eab308' : 'transparent';
        }

        function updateUI() {
            document.getElementById('total-dist').innerText = Math.max(0, totalDistance).toFixed(2);
            document.getElementById('node-count').innerText = points.length;
        }

        window.addEventListener('resize', () => {
            if (isInitialized) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
