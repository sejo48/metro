<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor AR Pro - Jorge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            color: white;
        }
        /* Contenedor principal de la interfaz */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none; /* Permite tocar el AR de fondo */
            z-index: 10;
        }
        /* Tarjeta de información superior */
        .info-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            margin: 20px;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }
        #distance-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffcc00;
            margin: 5px 0;
        }
        /* Barra de herramientas inferior */
        .controls-bar {
            display: flex;
            justify-content: space-around;
            padding: 30px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            pointer-events: auto;
        }
        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            flex-direction: column;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.9); }
        .btn-primary { background: #ffcc00; color: black; font-weight: bold; border: none; }
        .btn svg { width: 24px; height: 24px; margin-bottom: 4px; }

        #start-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            z-index: 200;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: #ffcc00;">Medidor AR Pro</h1>
        <p>Asegúrate de estar en un lugar iluminado.</p>
        <button id="ar-launch-btn" style="padding: 15px 40px; border-radius: 30px; border: none; background: #ffcc00; font-weight: bold; font-size: 1.2rem;">INICIAR CÁMARA</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div class="info-panel">
            <div style="text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem;">Distancia Total</div>
            <div id="distance-text">0.00 m</div>
            <div style="font-size: 0.8rem; opacity: 0.8;">Apunta al suelo y toca para marcar</div>
        </div>

        <div class="controls-bar">
            <div class="btn" id="undo-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14L4 9l5-5M4 9h11a4 4 0 0 1 4 4v1"></path></svg>
                Borrar
            </div>
            
            <div class="btn" id="save-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                Foto
            </div>

            <div class="btn" id="reset-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                Limpiar
            </div>
        </div>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        
        let points = []; // Coordenadas Vector3
        let spheres = []; // Meshes de las esferas
        let line = null;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                preserveDrawingBuffer: true // Necesario para la captura de pantalla
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Configurar AR con Overlay
            const overlay = document.getElementById('ui-overlay');
            const arBtn = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: overlay }
            });

            document.getElementById('ar-launch-btn').addEventListener('click', () => {
                arBtn.click();
                document.getElementById('start-screen').style.display = 'none';
                overlay.style.display = 'flex';
            });

            // El retículo (punto de mira)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffcc00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Evento de toque
            const controller = renderer.xr.getController(0);
            controller.addEventListener('select', () => {
                if (reticle.visible) {
                    const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    addPoint(pos);
                }
            });
            scene.add(controller);

            // Botones de la interfaz
            document.getElementById('undo-btn').onclick = undoLastPoint;
            document.getElementById('reset-btn').onclick = resetMeasurement;
            document.getElementById('save-btn').onclick = captureImage;

            renderer.setAnimationLoop(render);
        }

        function addPoint(pos) {
            const geometry = new THREE.SphereGeometry(0.015, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.copy(pos);
            scene.add(sphere);
            
            points.push(pos);
            spheres.push(sphere);
            updateLine();
        }

        function undoLastPoint() {
            if (points.length > 0) {
                points.pop();
                const s = spheres.pop();
                scene.remove(s);
                updateLine();
            }
        }

        function resetMeasurement() {
            points = [];
            spheres.forEach(s => scene.remove(s));
            spheres = [];
            if (line) scene.remove(line);
            line = null;
            document.getElementById('distance-text').innerText = "0.00 m";
        }

        function updateLine() {
            if (line) scene.remove(line);
            if (points.length >= 2) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({ color: 0xffcc00, linewidth: 4 });
                line = new THREE.Line(geo, mat);
                scene.add(line);
            }
            calculateDistance();
        }

        function calculateDistance() {
            let dist = 0;
            for (let i = 0; i < points.length - 1; i++) {
                dist += points[i].distanceTo(points[i+1]);
            }
            document.getElementById('distance-text').innerText = dist.toFixed(2) + " m";
        }

        function captureImage() {
            // Intenta descargar el canvas
            const link = document.createElement('a');
            link.download = 'medida_jorge.png';
            link.href = renderer.domElement.toDataURL('image/png');
            link.click();
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(source => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length) {
                        const hit = results[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
