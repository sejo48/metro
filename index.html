<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medidor AR Pro - Jorge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* IMPORTANTE: El fondo debe ser transparente para que se vea la cámara */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent !important;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        /* Pantalla de inicio negra hasta que encienda la cámara */
        #start-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 1000;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
        }
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: #ffcc00;
            border-radius: 50%;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            margin: 20px;
            padding: 15px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }
        #distance-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffcc00;
            margin: 0;
        }

        .bottom-controls {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding-bottom: env(safe-area-inset-bottom, 30px);
            padding-top: 20px;
            pointer-events: auto;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        #action-btn {
            width: 85px;
            height: 85px;
            background: #ffcc00;
            border-radius: 50%;
            border: 5px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        #action-btn svg { width: 45px; height: 45px; fill: black; }

        .btn-side {
            background: rgba(0, 0, 0, 0.5);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid white;
        }

        /* Estilo del botón oficial de AR */
        #ARButton {
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            margin-top: 20px;
            padding: 20px 40px !important;
            font-size: 1.2rem !important;
            font-weight: bold !important;
            background: #ffcc00 !important;
            color: black !important;
            border-radius: 50px !important;
            border: none !important;
            box-shadow: 0 10px 20px rgba(255,204,0,0.4) !important;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: #ffcc00;">MEDIDOR AR</h1>
        <p>Jorge, presiona abajo para encender la cámara.</p>
        <div id="button-container"></div>
        <p id="error-log" style="color: #ff4444; margin-top: 20px; font-size: 0.9rem; max-width: 80%;"></p>
    </div>

    <div id="ui-overlay">
        <div class="info-panel">
            <div id="distance-text">0.00 m</div>
            <div id="status-label" style="font-size: 0.8rem; color: #aaa;">MOVER MÓVIL PARA CALIBRAR</div>
        </div>

        <div id="crosshair"></div>

        <div class="bottom-controls">
            <div class="btn-side" id="undo-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M9 14L4 9l5-5M4 9h11a4 4 0 0 1 4 4v1"></path></svg>
            </div>
            
            <div id="action-btn">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>

            <div class="btn-side" id="reset-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </div>
        </div>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let points = [];
        let spheres = [];
        let line = null;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const overlay = document.getElementById('ui-overlay');
            
            // Botón oficial de AR con todos los requerimientos
            const arButton = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: overlay }
            });

            document.getElementById('button-container').appendChild(arButton);

            // Detectar cuando inicia la sesión
            renderer.xr.addEventListener('sessionstart', () => {
                document.getElementById('start-screen').style.display = 'none';
                overlay.style.display = 'flex';
                console.log("Cámara iniciada");
            });

            renderer.xr.addEventListener('sessionend', () => {
                location.reload(); // Si se cierra, recargar para limpiar
            });

            // Luz
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            // Retículo para el suelo
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffcc00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Botón +
            document.getElementById('action-btn').addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (reticle.visible) {
                    const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    addPoint(pos);
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            });

            document.getElementById('undo-btn').onclick = undo;
            document.getElementById('reset-btn').onclick = reset;

            renderer.setAnimationLoop(render);
        }

        function addPoint(pos) {
            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.015, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            sphere.position.copy(pos);
            scene.add(sphere);
            points.push(pos);
            spheres.push(sphere);
            updateLine();
        }

        function undo() {
            if (points.length > 0) {
                points.pop();
                scene.remove(spheres.pop());
                updateLine();
            }
        }

        function reset() {
            points = [];
            spheres.forEach(s => scene.remove(s));
            spheres = [];
            if (line) scene.remove(line);
            line = null;
            document.getElementById('distance-text').innerText = "0.00 m";
        }

        function updateLine() {
            if (line) scene.remove(line);
            if (points.length >= 2) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffcc00, linewidth: 10 }));
                scene.add(line);
            }
            let dist = 0;
            for (let i = 0; i < points.length - 1; i++) dist += points[i].distanceTo(points[i+1]);
            document.getElementById('distance-text').innerText = dist.toFixed(2) + " m";
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(source => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length) {
                        const hit = results[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                        document.getElementById('status-label').innerText = "LISTO PARA MEDIR";
                        document.getElementById('status-label').style.color = "#00ff00";
                    } else {
                        reticle.visible = false;
                        document.getElementById('status-label').innerText = "CALIBRANDO SUELO...";
                        document.getElementById('status-label').style.color = "#ff4444";
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
