<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Real Measure - Jorge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-col: column; justify-content: space-between;
            pointer-events: none; z-index: 10; padding: 24px;
        }
        .glass {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }
        #ar-button {
            pointer-events: auto;
            background: #3b82f6;
            color: white;
            font-weight: 900;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Interfaz de Usuario -->
    <div id="overlay">
        <!-- Info Superior -->
        <div class="flex justify-center">
            <div id="info-panel" class="glass p-6 rounded-3xl border-b-4 border-blue-500 text-center w-full max-w-xs hidden">
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1">Distancia Real</p>
                <div class="flex items-baseline justify-center">
                    <span id="dist-display" class="text-6xl font-black">0.00</span>
                    <span class="text-2xl ml-2 font-bold opacity-50">m</span>
                </div>
            </div>
        </div>

        <!-- Centro: Guía de escaneo -->
        <div id="scanner-guide" class="text-center">
            <p class="text-white font-bold text-sm bg-black/50 py-2 px-4 rounded-full inline-block">Mueve el celular para detectar el piso...</p>
        </div>

        <!-- Botones Inferiores -->
        <div class="flex flex-col gap-4">
            <div id="ui-controls" class="hidden flex flex-col gap-4">
                <button id="btn-mark" class="glass w-full h-24 bg-white text-black rounded-3xl flex flex-col items-center justify-center shadow-2xl active:scale-95 transition-all">
                    <span id="action-text" class="text-2xl font-black italic">FIJAR INICIO</span>
                    <span class="text-[9px] font-bold opacity-50 uppercase">Toca para poner el punto en el piso</span>
                </button>
                <button onclick="location.reload()" class="glass w-full py-4 rounded-2xl text-red-500 font-bold text-xs uppercase">
                    Reiniciar Aplicación
                </button>
            </div>
            
            <!-- Botón de entrada AR (Siempre visible al inicio) -->
            <button id="ar-button">INICIAR MODO AR</button>
        </div>
    </div>

    <script>
        let renderer, scene, camera;
        let xrSession = null;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let startPoint = null;
        let marker = null;
        let isMeasuring = false;
        let currentPoint = new THREE.Vector3();

        const arButton = document.getElementById('ar-button');
        const infoPanel = document.getElementById('info-panel');
        const uiControls = document.getElementById('ui-controls');
        const btnMark = document.getElementById('btn-mark');
        const distDisplay = document.getElementById('dist-display');
        const scannerGuide = document.getElementById('scanner-guide');

        // Inicialización de Three.js
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Luz básica
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // Marcador que sigue al piso
            const markerGeo = new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2);
            marker = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({ color: 0x3b82f6 }));
            marker.visible = false;
            scene.add(marker);

            arButton.addEventListener('click', onArButtonClick);
        }

        async function onArButtonClick() {
            if (xrSession === null) {
                const sessionInit = { optionalFeatures: ['dom-overlay'], domOverlay: { root: document.body } };
                try {
                    const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                    onSessionStarted(session);
                } catch (e) {
                    alert("Tu celular no soporta AR Real o necesitas usar HTTPS.");
                }
            }
        }

        function onSessionStarted(session) {
            xrSession = session;
            arButton.classList.add('hidden');
            infoPanel.classList.remove('hidden');
            uiControls.classList.remove('hidden');

            session.addEventListener('end', () => {
                xrSession = null;
                location.reload();
            });

            renderer.xr.setSession(session);
            renderer.setAnimationLoop(render);
        }

        btnMark.addEventListener('click', () => {
            if (!marker.visible) return;

            if (!isMeasuring) {
                // Poner punto inicial
                startPoint = new THREE.Vector3().setFromMatrixPosition(marker.matrix);
                
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.02, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0x22c55e })
                );
                dot.position.copy(startPoint);
                scene.add(dot);

                document.getElementById('action-text').innerText = "MIDIENDO...";
                isMeasuring = true;
            } else {
                isMeasuring = false;
                document.getElementById('action-text').innerText = "MEDIDA FIJADA";
                btnMark.classList.add('opacity-50');
            }
        });

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = frame.session;

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((referenceSpace) => {
                        session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        marker.visible = true;
                        marker.matrix.fromArray(pose.transform.matrix);
                        scannerGuide.classList.add('hidden');

                        if (isMeasuring && startPoint) {
                            currentPoint.setFromMatrixPosition(marker.matrix);
                            // DISTANCIA FÍSICA REAL (WebXR usa metros)
                            const dist = startPoint.distanceTo(currentPoint);
                            distDisplay.innerText = dist.toFixed(2);
                        }
                    } else {
                        marker.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
