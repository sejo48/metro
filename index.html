<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Checker - Jorge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:black;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    height:100vh;
}
#box {
    background: rgba(0,0,0,0.7);
    padding:20px;
    border-radius:15px;
}
button {
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="box">
    <h2>Verificando AR...</h2>
    <p id="msg">Un momento Jorge...</p>
    <button id="btn" style="display:none;">Iniciar AR</button>
</div>

<script type="module">
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

const msg = document.getElementById("msg");
const btn = document.getElementById("btn");

async function checkAR() {

    if (!navigator.xr) {
        msg.innerText = "❌ Tu navegador no soporta WebXR";
        return;
    }

    try {
        const supported = await navigator.xr.isSessionSupported('immersive-ar');

        if (!supported) {
            msg.innerText = "❌ Tu teléfono no soporta AR (falta ARCore o hardware)";
            return;
        }

        msg.innerText = "✅ AR compatible. Puedes iniciar.";
        btn.style.display = "block";

        btn.onclick = startAR;

    } catch (e) {
        msg.innerText = "⚠️ Error verificando AR";
    }
}

function startAR() {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);

    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.innerHTML = ""; // limpiar UI
    document.body.appendChild(renderer.domElement);

    document.body.appendChild(
        ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] })
    );

    scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

    renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
    });
}

checkAR();
</script>

</body>
</html>
