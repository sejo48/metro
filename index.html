<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medidor de Distancia Real - Jorge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        #video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }
        canvas {
            display: block; position: fixed; top: 0; left: 0;
            z-index: 1; pointer-events: none;
        }
        .glass {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .pulse-effect { animation: pulse 2s infinite; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden font-sans">

    <video id="video-background" autoplay playsinline muted></video>

    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="fixed inset-0 z-50 flex items-center justify-center p-6 glass">
        <div class="max-w-sm w-full text-center">
            <h1 class="text-3xl font-black mb-4 text-blue-400">MEDIDOR REAL</h1>
            <p class="text-gray-400 mb-8">Toca el botón para activar la cámara y los sensores.</p>
            <button id="btn-init" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-xl shadow-xl shadow-blue-900/40">
                ACTIVAR AHORA
            </button>
        </div>
    </div>

    <!-- Interfaz de Medición -->
    <div id="hud" class="fixed inset-0 pointer-events-none flex flex-col justify-between p-8 opacity-0 transition-opacity">
        
        <!-- Cuadro de Información -->
        <div class="flex justify-center">
            <div class="glass p-6 rounded-3xl border-b-4 border-blue-500 text-center w-full max-w-xs">
                <p class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Distancia Recorrida</p>
                <div class="flex items-baseline justify-center">
                    <span id="dist-display" class="text-6xl font-black">0.00</span>
                    <span class="text-2xl ml-2 font-bold opacity-50">m</span>
                </div>
            </div>
        </div>

        <!-- Mira Central -->
        <div class="flex items-center justify-center">
            <div class="relative flex items-center justify-center">
                <div class="w-16 h-16 border-2 border-white/20 rounded-full pulse-effect"></div>
                <div class="absolute w-2 h-2 bg-white rounded-full"></div>
            </div>
        </div>

        <!-- Botones de Acción -->
        <div class="flex flex-col gap-4 pointer-events-auto">
            <button id="btn-action" onclick="handleAction()" class="w-full h-24 bg-white text-black rounded-3xl flex flex-col items-center justify-center shadow-2xl active:scale-95 transition-all">
                <span id="action-text" class="text-2xl font-black tracking-tighter">FIJAR INICIO</span>
                <span id="action-subtext" class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Toca para empezar a medir</span>
            </button>
            
            <button onclick="resetAll()" class="w-full py-4 glass rounded-2xl text-red-500 font-bold text-sm border border-red-500/20">
                REINICIAR TODO
            </button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, raycaster;
        let startPoint = null;
        let startMesh = null;
        let isRunning = false;
        let groundPlane;
        let deviceHeight = 1.6; // Altura estándar

        document.getElementById('btn-init').onclick = async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try { await DeviceOrientationEvent.requestPermission(); } catch (e) { console.error(e); }
            }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('opacity-0');
            initApp();
        };

        async function initApp() {
            // Cámara de video
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                document.getElementById('video-background').srcObject = stream;
            } catch (e) { alert("Error: No hay acceso a la cámara."); }

            // Three.js
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            // Plano del suelo
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            groundGeo.rotateX(-Math.PI / 2);
            groundPlane = new THREE.Mesh(groundGeo, new THREE.MeshBasicMaterial({ visible: false }));
            scene.add(groundPlane);

            camera.position.set(0, deviceHeight, 0);

            // Giroscopio para mover la cámara
            window.addEventListener('deviceorientation', (e) => {
                if (!e.alpha) return;
                const alpha = THREE.MathUtils.degToRad(e.alpha);
                const beta = THREE.MathUtils.degToRad(e.beta);
                const gamma = THREE.MathUtils.degToRad(e.gamma);
                camera.rotation.set(beta - Math.PI/2, gamma, alpha, 'YXZ');
            }, true);

            animate();
        }

        function handleAction() {
            if (!isRunning) {
                // Fijar punto de inicio
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const intersects = raycaster.intersectObject(groundPlane);
                
                if (intersects.length > 0) {
                    startPoint = intersects[0].point.clone();
                } else {
                    // Si no detecta suelo, pone el punto a 1 metro frente a ti
                    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    startPoint = new THREE.Vector3().copy(camera.position).add(dir.multiplyScalar(1));
                    startPoint.y = 0; // Forzar al suelo
                }

                // Crear marca visual verde
                startMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 24, 24),
                    new THREE.MeshBasicMaterial({ color: 0x22c55e })
                );
                startMesh.position.copy(startPoint);
                scene.add(startMesh);

                document.getElementById('action-text').innerText = "MIDIENDO...";
                document.getElementById('action-subtext').innerText = "Muévete para ver la distancia";
                document.getElementById('btn-action').classList.replace('bg-white', 'bg-blue-600');
                document.getElementById('btn-action').classList.add('text-white');
                isRunning = true;
            } else {
                // Detener medición (Congelar)
                isRunning = false;
                document.getElementById('action-text').innerText = "MEDICIÓN FIJADA";
                document.getElementById('action-subtext').innerText = "Toca abajo para reiniciar";
            }
        }

        function resetAll() {
            if (startMesh) scene.remove(startMesh);
            startPoint = null;
            isRunning = false;
            document.getElementById('dist-display').innerText = "0.00";
            document.getElementById('action-text').innerText = "FIJAR INICIO";
            document.getElementById('action-subtext').innerText = "Toca para empezar a medir";
            document.getElementById('btn-action').className = "w-full h-24 bg-white text-black rounded-3xl flex flex-col items-center justify-center shadow-2xl active:scale-95 transition-all";
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isRunning && startPoint) {
                // Calculamos donde está apuntando el móvil ahora
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const intersects = raycaster.intersectObject(groundPlane);
                
                let currentPos = new THREE.Vector3();
                if (intersects.length > 0) {
                    currentPos.copy(intersects[0].point);
                } else {
                    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    currentPos.copy(camera.position).add(dir.multiplyScalar(1));
                    currentPos.y = 0;
                }

                // Calcular distancia del inicio al punto actual
                const dist = startPoint.distanceTo(currentPos);
                document.getElementById('dist-display').innerText = dist.toFixed(2);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
