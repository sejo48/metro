<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor AR Real - Jorge</title>

<style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #btn { 
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        padding: 15px 25px; background: black; color: white;
        border-radius: 20px; font-weight: bold;
    }
    #info {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        color: white; font-size: 20px;
    }
</style>
</head>

<body>

<div id="info">0.00 m</div>
<button id="btn">INICIAR AR</button>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/webxr/ARButton.js";

let camera, scene, renderer;
let controller;
let hitTestSource = null;
let hitTestSourceRequested = false;

let startPoint = null;

init();

function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera();

    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;

    document.body.appendChild(renderer.domElement);

    const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
    scene.add(light);

    controller = renderer.xr.getController(0);
    controller.addEventListener('select', onSelect);
    scene.add(controller);

    document.getElementById("btn").onclick = () => {
        document.body.appendChild(
            ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test']
            })
        );
    };

    renderer.setAnimationLoop(render);
}

function onSelect() {
    if (!hitTestSource) return;

    if (!startPoint) {
        startPoint = new THREE.Vector3().setFromMatrixPosition(currentMatrix);
    } else {
        startPoint = null;
        document.getElementById("info").innerText = "0.00 m";
    }
}

let currentMatrix = new THREE.Matrix4();

function render(timestamp, frame) {

    if (frame) {

        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (!hitTestSourceRequested) {

            session.requestReferenceSpace('viewer').then((space) => {
                session.requestHitTestSource({ space: space }).then((source) => {
                    hitTestSource = source;
                });
            });

            session.addEventListener('end', () => {
                hitTestSourceRequested = false;
                hitTestSource = null;
            });

            hitTestSourceRequested = true;
        }

        if (hitTestSource) {
            const hitTestResults = frame.getHitTestResults(hitTestSource);

            if (hitTestResults.length) {

                const hit = hitTestResults[0];
                const pose = hit.getPose(referenceSpace);

                currentMatrix.fromArray(pose.transform.matrix);

                const currentPos = new THREE.Vector3().setFromMatrixPosition(currentMatrix);

                if (startPoint) {
                    const dist = startPoint.distanceTo(currentPos);
                    document.getElementById("info").innerText = dist.toFixed(2) + " m";
                }
            }
        }
    }

    renderer.render(scene, camera);
}
</script>

</body>
</html>
