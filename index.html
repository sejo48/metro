<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor AR Pro - Jorge Hernández</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: system-ui, sans-serif; }
        canvas { display: block; }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .neon-border { border: 1px solid rgba(34, 211, 238, 0.3); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        #ar-button-container button {
            white-space: nowrap !important;
            width: auto !important;
            min-width: 220px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-between py-16 px-6 bg-slate-950 text-white text-center">
        <div class="mt-10">
            <div class="mb-6 w-20 h-20 bg-cyan-600 rounded-3xl mx-auto flex items-center justify-center shadow-[0_0_40px_rgba(8,145,178,0.4)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-950" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white leading-none">MEDIDOR <span class="text-cyan-400">AR</span></h1>
            <p class="text-slate-400 text-xs tracking-widest mt-2 uppercase font-bold opacity-60">Paredes, Muebles y Terrenos</p>
        </div>

        <div id="ar-button-container" class="w-full flex justify-center px-4"></div>

        <div class="opacity-80">
            <p class="text-[10px] tracking-[0.3em] text-cyan-500 font-black mb-1 uppercase">Jorge Hernández</p>
            <p class="text-lg font-light tracking-tight">Especialista <span class="font-bold text-cyan-400 italic">2026</span></p>
        </div>
    </div>

    <!-- Interfaz de Medición -->
    <div id="ui-layer" class="fixed inset-0 pointer-events-none hidden flex-col justify-between p-6 z-40">
        
        <!-- Panel de Resultados -->
        <div class="flex flex-col items-center gap-4">
            <div class="glass p-5 rounded-[2.5rem] text-center shadow-2xl neon-border min-w-[260px] relative overflow-hidden">
                <div id="height-mode-indicator" class="hidden mb-2 bg-yellow-500/20 py-1 rounded-full border border-yellow-500/30">
                    <span class="text-[9px] font-black uppercase text-yellow-500 tracking-widest italic">Modo Altura Activo</span>
                </div>
                
                <div class="flex flex-col items-center">
                    <div class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Medición Actual</div>
                    <div id="distance-display" class="text-5xl font-black text-white tracking-tighter italic leading-none">0.00 <span class="text-xl not-italic font-medium text-cyan-400">m</span></div>
                </div>

                <!-- Indicador de Nivel -->
                <div class="mt-3 h-1 w-full bg-slate-800 rounded-full relative overflow-hidden">
                    <div id="level-bar" class="absolute h-full bg-cyan-400 w-4 left-1/2 -translate-x-1/2 rounded-full transition-all duration-75"></div>
                </div>
            </div>
            
            <div id="status-tag" class="glass px-4 py-1 rounded-full text-[9px] font-black uppercase text-white/50 tracking-widest transition-colors italic">
                Buscando superficie...
            </div>
        </div>

        <!-- Cursor -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none flex items-center justify-center">
            <div class="w-14 h-14 border border-white/10 rounded-full"></div>
            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_15px_#22d3ee]"></div>
        </div>

        <!-- Botones Inferiores -->
        <div class="flex flex-col gap-4 pointer-events-auto">
            <div class="flex justify-between items-center gap-3">
                <button id="height-btn" class="glass flex-1 py-6 rounded-[2.5rem] active:scale-95 border-yellow-500/30 flex items-center justify-center gap-3 shadow-lg transition-colors" title="Medir Altura">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                    </svg>
                    <span class="text-white text-xs font-black uppercase tracking-widest">Medir Altura</span>
                </button>

                <button id="clear-btn" class="glass p-6 rounded-[2rem] active:scale-90 border-red-500/20 shadow-lg text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
        import { ARButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        
        let points = [];
        let markers = [];
        let mainLine = null;
        let isHeightMode = false;
        let basePoint = null;

        const distanceDisplay = document.getElementById('distance-display');
        const uiLayer = document.getElementById('ui-layer');
        const startScreen = document.getElementById('start-screen');
        const statusTag = document.getElementById('status-tag');
        const levelBar = document.getElementById('level-bar');
        const heightBtn = document.getElementById('height-btn');
        const heightModeIndicator = document.getElementById('height-mode-indicator');

        async function init() {
            if ('xr' in navigator) {
                const supported = await navigator.xr.isSessionSupported('immersive-ar');
                if (supported) setupAR();
            }
        }

        function setupAR() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const button = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            
            button.classList.add('!bg-cyan-600', '!text-white', '!font-black', '!rounded-2xl', '!py-4', '!px-8', '!border-none', '!static', '!uppercase', '!tracking-tight', '!text-sm', '!shadow-xl');
            document.getElementById('ar-button-container').appendChild(button);

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2));

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x22d3ee })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            renderer.xr.addEventListener('sessionstart', () => {
                startScreen.style.display = 'none';
                uiLayer.style.display = 'flex';
                window.addEventListener('deviceorientation', handleOrientation);
            });

            window.addEventListener('click', (ev) => {
                if (ev.target.closest('button')) return;
                
                if (isHeightMode) {
                    handleHeightModeClick();
                } else {
                    handleNormalModeClick();
                }
            });

            heightBtn.addEventListener('click', toggleHeightMode);
            document.getElementById('clear-btn').addEventListener('click', () => location.reload());

            renderer.setAnimationLoop(render);
        }

        function toggleHeightMode() {
            isHeightMode = !isHeightMode;
            if (isHeightMode) {
                heightBtn.classList.add('bg-yellow-500/20', 'border-yellow-500');
                heightModeIndicator.classList.remove('hidden');
                statusTag.innerText = "Fije la base en el suelo";
                basePoint = null;
            } else {
                heightBtn.classList.remove('bg-yellow-500/20', 'border-yellow-500');
                heightModeIndicator.classList.add('hidden');
                statusTag.innerText = "Buscando superficie...";
            }
            clearMeasurements();
        }

        function handleHeightModeClick() {
            if (!reticle.visible && !basePoint) return;

            if (!basePoint) {
                basePoint = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                addMarker(basePoint, 0x22c55e);
                statusTag.innerText = "Suba el móvil para medir altura";
            } else {
                const currentHeight = Math.abs(camera.position.y - basePoint.y);
                const topPoint = new THREE.Vector3(basePoint.x, basePoint.y + currentHeight, basePoint.z);
                addMarker(topPoint, 0xeab308);
                points.push(basePoint, topPoint);
                updateLine();
                statusTag.innerText = "Altura fijada";
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }

        function handleNormalModeClick() {
            if (!reticle.visible) return;
            const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
            addMarker(pos, points.length === 0 ? 0x22c55e : 0x06b6d4);
            points.push(pos);
            updateLine();
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function addMarker(pos, color) {
            const marker = new THREE.Mesh(
                new THREE.SphereGeometry(0.012, 16, 16),
                new THREE.MeshBasicMaterial({ color: color })
            );
            marker.position.copy(pos);
            scene.add(marker);
            markers.push(marker);
        }

        function handleOrientation(event) {
            const roll = event.gamma; 
            const offset = (roll / 45) * 50;
            levelBar.style.left = `${50 + offset}%`;
            levelBar.className = Math.abs(roll) < 2 ? "absolute h-full bg-green-400 w-4 rounded-full" : "absolute h-full bg-cyan-400 w-4 rounded-full";
        }

        function updateLine() {
            if (mainLine) scene.remove(mainLine);
            if (points.length >= 2) {
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                mainLine = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
                scene.add(mainLine);
                let total = 0;
                for (let i = 0; i < points.length - 1; i++) total += points[i].distanceTo(points[i+1]);
                distanceDisplay.innerHTML = `${total.toFixed(2)} <span class="text-xl">m</span>`;
            }
        }

        function clearMeasurements() {
            markers.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
            if (mainLine) scene.remove(mainLine);
            markers = []; points = []; mainLine = null;
            distanceDisplay.innerHTML = `0.00 <span class="text-xl">m</span>`;
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const refSpace = renderer.xr.getReferenceSpace();
                
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(rs => {
                        session.requestHitTestSource({ space: rs }).then(src => hitTestSource = src);
                    });
                    hitTestSourceRequested = true;
                }
                
                if (hitTestSource) {
                    const hits = frame.getHitTestResults(hitTestSource);
                    if (hits.length > 0) {
                        const hit = hits[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(refSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }

                if (isHeightMode && basePoint && !points.length) {
                    const currentH = Math.abs(camera.position.y - basePoint.y);
                    distanceDisplay.innerHTML = `${currentH.toFixed(2)} <span class="text-xl">m</span>`;
                }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
