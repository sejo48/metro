<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Measure Pro - Diagnóstico Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .reticle-pulse {
            animation: pulse 1.5s infinite ease-in-out;
        }
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        .glass-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden font-sans">

    <!-- Fondo de Cámara -->
    <video id="video-background" autoplay playsinline muted></video>

    <!-- Pantalla de Diagnóstico Inicial -->
    <div id="diag-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-6 glass-panel">
        <div class="max-w-md w-full bg-gray-900 rounded-3xl p-8 shadow-2xl border border-gray-700">
            <h2 class="text-2xl font-bold mb-4 text-center">Diagnóstico AR</h2>
            <div id="diag-list" class="space-y-4 text-sm">
                <!-- Lista de verificación -->
            </div>
            <div id="browser-help" class="mt-6 hidden">
                <p class="text-xs text-gray-400 mb-4 text-center">Navegador no compatible. Copia el enlace y ábrelo en Chrome para Android o Safari en iOS.</p>
                <button onclick="copyToClipboard()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Copiar Enlace</button>
            </div>
            <button id="btn-start" class="w-full mt-6 bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl hidden">
                COMENZAR MEDICIÓN
            </button>
        </div>
    </div>

    <!-- Interfaz de Usuario (HUD) -->
    <div id="hud" class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6 opacity-0 transition-opacity duration-500 z-10">
        <!-- Panel Superior -->
        <div class="flex justify-between items-start pt-4">
            <div class="glass-panel p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Total Medido</p>
                <p class="text-4xl font-black text-green-400"><span id="total-dist">0.00</span><span class="text-lg ml-1 text-white">m</span></p>
            </div>
            <div class="glass-panel p-4 rounded-2xl text-right">
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Nodos</p>
                <p id="node-count" class="text-2xl font-bold">0</p>
            </div>
        </div>

        <!-- Mira Central -->
        <div class="flex items-center justify-center">
            <div class="relative flex items-center justify-center">
                <div class="w-14 h-14 border-2 border-white rounded-full reticle-pulse opacity-40"></div>
                <div class="absolute w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_10px_white]"></div>
                <!-- Popup de Distancia de Segmento -->
                <div id="segment-dist-popup" class="absolute bottom-16 glass-panel px-4 py-1.5 rounded-full text-sm font-black whitespace-nowrap opacity-0 transition-all scale-90 translate-y-2">
                    <span id="current-segment-val">0.00</span> m
                </div>
            </div>
        </div>

        <!-- Controles Inferiores -->
        <div class="flex flex-col gap-4 pointer-events-auto">
            <div class="flex justify-center gap-3">
                <button onclick="toggleMode('linear')" id="mode-linear" class="glass-panel px-6 py-2.5 rounded-full text-[10px] font-black border-2 border-blue-500 tracking-tighter">LINEAL</button>
                <button onclick="toggleMode('height')" id="mode-height" class="glass-panel px-6 py-2.5 rounded-full text-[10px] font-black border-2 border-transparent text-gray-500 tracking-tighter">ALTURA</button>
            </div>
            
            <div class="flex items-center justify-between gap-4 pb-4">
                <!-- Botón Reset -->
                <button onclick="resetScene()" class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-red-500 active:bg-red-900/40">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>

                <!-- Botón Principal: Marcar Punto -->
                <button id="main-action-btn" onclick="addPoint()" class="flex-1 h-20 bg-white text-black rounded-3xl flex flex-col items-center justify-center shadow-[0_10px_30px_rgba(255,255,255,0.2)] active:scale-95 transition-all">
                    <span class="text-lg font-black tracking-tighter">MARCAR PUNTO</span>
                    <span class="text-[9px] font-bold opacity-50 uppercase tracking-widest mt-0.5">Capturar posición</span>
                </button>

                <!-- Botón Deshacer -->
                <button onclick="undoLastPoint()" class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-yellow-500 active:bg-yellow-900/40">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- VARIABLES DE ESTADO ---
        let scene, camera, renderer, raycaster;
        let points = []; 
        let measurementLines = [];
        let currentMode = 'linear';
        let groundPlane;
        let totalDistance = 0;
        let isInitialized = false;

        const COLORS = {
            base: 0x22c55e,        // Verde (Inicio)
            intermediate: 0x22d3ee, // Cian (Trayecto)
            height: 0xeab308       // Amarillo (Altura)
        };

        // --- SISTEMA DE DIAGNÓSTICO ---
        window.onload = async () => {
            const diagList = document.getElementById('diag-list');
            const isRestricted = /FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
            const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost';

            const checks = [
                { name: 'Conexión Segura (HTTPS)', status: isSecure },
                { name: 'Acceso a Cámara', status: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) },
                { name: 'Motor Gráfico 3D', status: !!window.WebGLRenderingContext },
                { name: 'Navegador Recomendado', status: !isRestricted }
            ];

            let ready = true;
            diagList.innerHTML = '';
            checks.forEach(c => {
                const item = document.createElement('div');
                item.className = "flex justify-between items-center bg-gray-800/50 p-3 rounded-xl border border-white/5";
                item.innerHTML = `<span>${c.name}</span><span class="${c.status ? 'text-green-400' : 'text-red-400'} font-black">${c.status ? '✓' : '✗'}</span>`;
                diagList.appendChild(item);
                if (!c.status && c.name !== 'Navegador Recomendado') ready = false;
            });

            if (isRestricted) document.getElementById('browser-help').classList.remove('hidden');
            if (ready) document.getElementById('btn-start').classList.remove('hidden');

            document.getElementById('btn-start').onclick = () => {
                document.getElementById('diag-overlay').classList.add('hidden');
                document.getElementById('hud').classList.remove('opacity-0');
                initApp();
            };
        };

        function copyToClipboard() {
            const temp = document.createElement('textarea');
            temp.value = window.location.href;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("Enlace copiado. Ábrelo en Chrome.");
        }

        // --- MOTOR DE REALIDAD AUMENTADA (SIMULADO) ---
        async function initApp() {
            if (isInitialized) return;

            try {
                const video = document.getElementById('video-background');
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
            } catch (e) {
                console.warn("No se pudo acceder a la cámara:", e);
            }

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            // Plano del suelo para detectar puntos (y=0)
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            groundGeo.rotateX(-Math.PI / 2);
            const groundMat = new THREE.MeshBasicMaterial({ visible: false });
            groundPlane = new THREE.Mesh(groundGeo, groundMat);
            scene.add(groundPlane);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
            camera.position.set(0, 1.6, 0); 
            
            isInitialized = true;
            animate();
        }

        function animate() {
            if (!isInitialized) return;
            requestAnimationFrame(animate);
            
            // Lógica de Raycasting para mostrar distancia dinámica antes de marcar
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObject(groundPlane);
            
            if (points.length > 0) {
                const lastPoint = points[points.length - 1].pos;
                let currentPos = new THREE.Vector3();

                if (intersects.length > 0) {
                    currentPos.copy(intersects[0].point);
                } else {
                    // Fallback: proyectar a 2 metros si no toca el suelo
                    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    currentPos.copy(camera.position).add(dir.multiplyScalar(2));
                }

                let dist;
                if (currentMode === 'height') {
                    dist = Math.abs(camera.position.y - lastPoint.y);
                } else {
                    dist = lastPoint.distanceTo(currentPos);
                }
                
                document.getElementById('current-segment-val').innerText = dist.toFixed(2);
                document.getElementById('segment-dist-popup').style.opacity = '1';
                document.getElementById('segment-dist-popup').style.transform = 'scale(1) translateY(0)';
            }

            renderer.render(scene, camera);
        }

        function addPoint() {
            if (!isInitialized) return;

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObject(groundPlane);

            let targetPos = new THREE.Vector3();
            
            // PRIORIDAD 1: El suelo detectado
            if (intersects.length > 0) {
                targetPos.copy(intersects[0].point);
            } 
            // PRIORIDAD 2: Fallback (distancia fija 2m) para que "funcione" siempre
            else {
                const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                targetPos.copy(camera.position).add(direction.multiplyScalar(2));
            }

            let pointColor = COLORS.intermediate;

            if (points.length === 0) {
                pointColor = COLORS.base;
            } else if (currentMode === 'height') {
                pointColor = COLORS.height;
                const lastPoint = points[points.length - 1].pos;
                targetPos.x = lastPoint.x;
                targetPos.z = lastPoint.z;
                targetPos.y = camera.position.y; 
            }

            // Crear Esfera
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.05, 16, 16),
                new THREE.MeshBasicMaterial({ color: pointColor })
            );
            mesh.position.copy(targetPos);
            scene.add(mesh);

            // Crear Línea
            let line = null;
            if (points.length > 0) {
                const lastPoint = points[points.length - 1].pos;
                const lineGeo = new THREE.BufferGeometry().setFromPoints([lastPoint, targetPos]);
                const lineMat = new THREE.LineBasicMaterial({ color: pointColor, linewidth: 4 });
                line = new THREE.Line(lineGeo, lineMat);
                scene.add(line);
                
                totalDistance += lastPoint.distanceTo(targetPos);
            }

            measurementLines.push({ mesh, line });
            points.push({ pos: targetPos, type: currentMode });
            
            // Feedback táctil (vibración si está disponible)
            if (navigator.vibrate) navigator.vibrate(50);
            
            updateUI();
        }

        function undoLastPoint() {
            if (points.length === 0) return;
            const last = measurementLines.pop();
            if (last.mesh) scene.remove(last.mesh);
            if (last.line) {
                const lastP = points[points.length - 1].pos;
                const prevP = points[points.length - 2].pos;
                totalDistance -= lastP.distanceTo(prevP);
                scene.remove(last.line);
            }
            points.pop();
            updateUI();
        }

        function resetScene() {
            measurementLines.forEach(l => {
                scene.remove(l.mesh);
                if (l.line) scene.remove(l.line);
            });
            points = [];
            measurementLines = [];
            totalDistance = 0;
            updateUI();
        }

        function toggleMode(mode) {
            currentMode = mode;
            document.getElementById('mode-linear').style.borderColor = mode === 'linear' ? '#3b82f6' : 'transparent';
            document.getElementById('mode-linear').style.color = mode === 'linear' ? 'white' : '#6b7280';
            document.getElementById('mode-height').style.borderColor = mode === 'height' ? '#eab308' : 'transparent';
            document.getElementById('mode-height').style.color = mode === 'height' ? 'white' : '#6b7280';
        }

        function updateUI() {
            document.getElementById('total-dist').innerText = totalDistance.toFixed(2);
            document.getElementById('node-count').innerText = points.length;
        }

        window.addEventListener('resize', () => {
            if (isInitialized) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
