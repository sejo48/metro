<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medidor AR Pro - Jorge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            touch-action: none;
        }

        /* Contenedor principal para AR */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        /* Mira Central (Punto de mira fijo) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #crosshair::after {
            content: '';
            width: 4px;
            height: 4px;
            background: #ffcc00;
            border-radius: 50%;
            box-shadow: 0 0 5px #ffcc00;
        }

        /* Panel de Medida Superior (Más compacto) */
        .info-panel {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            margin: 15px;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }
        #distance-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffcc00;
            margin: 0;
        }

        /* Controles Inferiores (Pegados abajo para el pulgar) */
        .bottom-controls {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            padding-top: 20px;
            pointer-events: auto;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        /* Botón de Acción Amarillo (+) - Posición ergonómica */
        #action-btn {
            width: 85px;
            height: 85px;
            background: #ffcc00;
            border-radius: 50%;
            border: 4px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
        }
        #action-btn:active { transform: scale(0.9); }
        #action-btn svg { width: 40px; height: 40px; fill: black; }

        .btn-side {
            background: rgba(40, 40, 40, 0.8);
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-side svg { width: 24px; height: 24px; stroke: white; }

        /* Pantalla de Inicio */
        #start-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            z-index: 1000;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: #ffcc00; font-size: 2rem;">MEDIDOR AR</h1>
        <p style="margin-bottom: 30px; opacity: 0.7;">Calibra moviendo el móvil suavemente.</p>
        <button id="ar-launch-btn" style="padding: 15px 40px; border-radius: 30px; border: none; background: #ffcc00; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: black;">EMPEZAR</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <!-- Distancia arriba -->
        <div class="info-panel">
            <div id="distance-text">0.00 m</div>
        </div>

        <!-- Mira en el centro -->
        <div id="crosshair"></div>

        <!-- Botones abajo (Alcance del pulgar) -->
        <div class="bottom-controls">
            <div class="btn-side" id="undo-btn" title="Deshacer">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5M4 9h11a4 4 0 0 1 4 4v1"></path></svg>
            </div>
            
            <div id="action-btn">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>

            <div class="btn-side" id="reset-btn" title="Reiniciar">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </div>
        </div>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        
        let points = [];
        let spheres = [];
        let line = null;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const overlay = document.getElementById('ui-overlay');
            const arBtn = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: overlay }
            });

            document.getElementById('ar-launch-btn').addEventListener('click', () => {
                arBtn.click();
                document.getElementById('start-screen').style.display = 'none';
                overlay.style.display = 'flex';
            });

            // Punto invisible en el suelo para cálculos
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.4 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Acción del botón principal
            document.getElementById('action-btn').addEventListener('click', (e) => {
                e.preventDefault();
                if (reticle.visible) {
                    const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    addPoint(pos);
                }
            });

            document.getElementById('undo-btn').addEventListener('click', (e) => {
                e.preventDefault();
                undoLastPoint();
            });

            document.getElementById('reset-btn').addEventListener('click', (e) => {
                e.preventDefault();
                resetMeasurement();
            });

            renderer.setAnimationLoop(render);
        }

        function addPoint(pos) {
            const geometry = new THREE.SphereGeometry(0.012, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.copy(pos);
            scene.add(sphere);
            
            points.push(pos);
            spheres.push(sphere);
            updateLine();
        }

        function undoLastPoint() {
            if (points.length > 0) {
                points.pop();
                scene.remove(spheres.pop());
                updateLine();
            }
        }

        function resetMeasurement() {
            points = [];
            spheres.forEach(s => scene.remove(s));
            spheres = [];
            if (line) scene.remove(line);
            line = null;
            document.getElementById('distance-text').innerText = "0.00 m";
        }

        function updateLine() {
            if (line) scene.remove(line);
            if (points.length >= 2) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({ color: 0xffcc00, linewidth: 6 });
                line = new THREE.Line(geo, mat);
                scene.add(line);
            }
            calculateDistance();
        }

        function calculateDistance() {
            let dist = 0;
            for (let i = 0; i < points.length - 1; i++) {
                dist += points[i].distanceTo(points[i+1]);
            }
            document.getElementById('distance-text').innerText = dist.toFixed(2) + " m";
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(ref => {
                        session.requestHitTestSource({ space: ref }).then(source => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length) {
                        const hit = results[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
